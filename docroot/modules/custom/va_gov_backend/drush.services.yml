services:
  va_gov_backend.metrics_commands:
    class: \Drupal\va_gov_backend\Commands\MetricsCommands
    arguments: ['@va_gov_backend.metrics']
    tags:
      - { name: drush.command }
  va_gov_backend.test_cleanup_commands:
    class: \Drupal\va_gov_backend\Commands\TestCleanupCommands
    arguments: ['@entity_type.manager']
    tags:
      - { name: drush.command }