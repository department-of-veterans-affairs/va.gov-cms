    value: '<p>Hi [message:field_editor_username],</p><p>The following sections in your product area do not currently have any active editors assigned:</p><p>[message:field_inactive_sections]</p><p>Please review coverage and work with the relevant teams to restore editor access where needed.</p><p>You can review all affected sections in the <a href="[message:field_webhost]/admin/people/users_per_section/no-active-users">Sections with no active users</a> report.</p>'
