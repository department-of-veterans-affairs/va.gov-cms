---
name: Build and Push Drupal Tag Container to ECR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Semver tag (cms/vX.Y.Z or vX.Y.Z (EKS)) to build. Leave blank to use latest.'
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Semver tag to build (called from tag-release-main)'
        required: true
        type: string
  push:
    tags:
      - 'cms/v*.*.*'  # Only tags starting with cms/v and containing two dots
      - 'v1.*.*'       # Tags from tag-release-main workflow
env:
  CMS_NOTIFICATIONS_SLACK: CJT90C0UT # cms-notifications

# Add concurrency to prevent parallel executions
concurrency:
  group: drupal-mirror-container-build
  cancel-in-progress: false

permissions:
  id-token: write  # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.select_tag.outputs.IMAGE_TAG }}
      IS_VALID: ${{ steps.select_tag.outputs.is_valid }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # Needed to list all tags for manual runs
          fetch-tags: true  # Ensure semver tags are available for selection
      - name: Select and validate tag
        id: select_tag
        run: |
          set -e
          TAG_PREFIX='cms/'
          SEMVER_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+$'

          normalize_input() {
            local raw="$1"
            if [[ "$raw" == ${TAG_PREFIX}* ]]; then
              echo "${raw#${TAG_PREFIX}}"
            else
              echo "$raw"
            fi
          }

          # Returns the full git tag ref (cms/vX.Y.Z or vX.Y.Z) if it exists, empty otherwise
          resolve_tag_ref() {
            local semver="$1"
            if git rev-parse -q --verify "refs/tags/${TAG_PREFIX}${semver}" >/dev/null 2>&1; then
              echo "${TAG_PREFIX}${semver}"
            elif git rev-parse -q --verify "refs/tags/${semver}" >/dev/null 2>&1; then
              echo "${semver}"
            fi
          }

          find_latest_tag() {
            # Search both cms/vX.Y.Z and vX.Y.Z tags, return the latest semver
            {
              git tag --list "${TAG_PREFIX}v*.*.*" | sed "s|^${TAG_PREFIX}||"
              git tag --list "v*.*.*" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$'
            } | sort -V -r | head -n1
          }

          INPUT_TAG='${{ github.event.inputs.tag || inputs.tag }}'
          RAW_TAG="$GITHUB_REF_NAME"

          # Priority order: explicit input, pushed tag ref, then latest semver.
          if [ -n "$INPUT_TAG" ]; then
            SEMVER_TAG=$(normalize_input "$INPUT_TAG")
            if [[ "$SEMVER_TAG" =~ $SEMVER_REGEX ]]; then
              TAG_REF=$(resolve_tag_ref "$SEMVER_TAG")
              if [ -n "$TAG_REF" ]; then
                echo "IMAGE_TAG=$SEMVER_TAG" >> $GITHUB_OUTPUT
                echo "TAG_REF=$TAG_REF" >> $GITHUB_OUTPUT
                echo "is_valid=true" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "::error title=Invalid Tag::Provided tag ${TAG_PREFIX}$SEMVER_TAG does not exist in repository." >&2
                echo "is_valid=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            else
              echo "::error title=Invalid Semver::Provided tag $INPUT_TAG is not strict semver vX.Y.Z (prefix ${TAG_PREFIX} optional)." >&2
              echo "is_valid=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            SEMVER_TAG=$(normalize_input "$RAW_TAG")
            if [[ "$SEMVER_TAG" =~ $SEMVER_REGEX ]]; then
              echo "IMAGE_TAG=$SEMVER_TAG" >> $GITHUB_OUTPUT
              echo "TAG_REF=$RAW_TAG" >> $GITHUB_OUTPUT
              echo "is_valid=true" >> $GITHUB_OUTPUT
            else
              echo "::error title=Invalid Pushed Tag::Pushed tag $RAW_TAG failed semver validation after removing prefix." >&2
              echo "is_valid=false" >> $GITHUB_OUTPUT
            fi
          else
            LATEST_TAG=$(find_latest_tag)
            if [ -z "$LATEST_TAG" ]; then
              echo "::error title=No Tags Found::No semver tags (${TAG_PREFIX}vX.Y.Z or vX.Y.Z) found in repository." >&2
              echo "is_valid=false" >> $GITHUB_OUTPUT
              exit 1
            fi
            SEMVER_TAG="$LATEST_TAG"
            if [[ ! "$SEMVER_TAG" =~ $SEMVER_REGEX ]]; then
              echo "::error title=Invalid Tag Format::Latest tag $LATEST_TAG does not match expected semver pattern." >&2
              echo "is_valid=false" >> $GITHUB_OUTPUT
              exit 1
            fi
            echo "Using latest semver tag: $SEMVER_TAG (repo tag $LATEST_TAG)"
            TAG_REF=$(resolve_tag_ref "$SEMVER_TAG")
            echo "IMAGE_TAG=$SEMVER_TAG" >> $GITHUB_OUTPUT
            echo "TAG_REF=${TAG_REF:-$SEMVER_TAG}" >> $GITHUB_OUTPUT
            echo "is_valid=true" >> $GITHUB_OUTPUT
            exit 0
          fi
      - name: Abort on invalid tag
        if: steps.select_tag.outputs.is_valid != 'true'
        run: |
          echo "::error title=Build Aborted::Invalid or missing semver tag; failing build job." >&2
          exit 1
      - name: Checkout tag ref
        if: steps.select_tag.outputs.is_valid == 'true'
        uses: actions/checkout@v6.0.2
        with:
          # Check out the exact tag so the Docker build context matches the release
          ref: refs/tags/${{ steps.select_tag.outputs.TAG_REF }}
          fetch-depth: 1
      - name: Configure AWS Credentials
        if: steps.select_tag.outputs.is_valid == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-gov-west-1
          role-to-assume: ${{ vars.AWS_ASSUME_ROLE }}
          role-duration-seconds: 900
          role-session-name: vsp-vagov-next-build-githubaction
      - name: Login to Amazon ECR
        if: steps.select_tag.outputs.is_valid == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Get last Apache image tag
        id: get_last_apache_tag
        run: |
          REPO_NAME="dsva/cms-apache"
          # Get all images sorted by push date (newest first)
          LAST_TAG="1.0.0"  # Default fallback
          IMAGES_JSON=$(aws ecr describe-images --repository-name $REPO_NAME --query 'sort_by(reverse(imageDetails),& imagePushedAt)' --output json)
          SEMVER_TAG=$(echo "$IMAGES_JSON" | jq -r '
            [.[] | select(.imageTags != null) |
             .imageTags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] |
            last
          ')

          LAST_TAG="$SEMVER_TAG"

          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        if: steps.select_tag.outputs.is_valid == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Build and push Docker image
        if: steps.select_tag.outputs.is_valid == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.login-ecr.outputs.registry }}/dsva/cms-drupal:${{ steps.select_tag.outputs.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/dsva/cms-drupal:cache
          cache-to: type=registry,mode=max,image-manifest=true,oci-mediatypes=true,ref=${{ steps.login-ecr.outputs.registry }}/dsva/cms-drupal:cache
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BASE_IMAGE_TAG=${{ env.LAST_TAG }}
            DD_GIT_COMMIT_SHA=${{ github.sha }}
