---
name: Tag and Release Latest Passing Commit on Main

on:
  workflow_dispatch:
  schedule:
    # 3:00 p.m. Eastern, weekdays
    - cron: '0 15 * * 1-5'
      timezone: 'America/New_York'

permissions:
  id-token: write # Required for OIDC with AWS
  contents: read # Required for actions/checkout

env:
  CMS_NOTIFICATIONS_SLACK: CJT90C0UT # cms-notifications

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
      statuses: read
    outputs:
      NEW_TAG: ${{ steps.create-tag.outputs.NEW_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Find latest passing commit on main
        id: find-commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COMMIT_SHA=$(bash scripts/find-latest-passing-main-commit.sh --repo "${{ github.repository }}" --max-commits 0 --verbose)
          echo "Found passing commit: $COMMIT_SHA"
          echo "COMMIT_SHA=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Determine next semver tag
        id: next-tag
        run: |
          set -euo pipefail

          # Find the latest vX.Y.Z tag
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            # Strip leading 'v'
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "NEXT_TAG=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "Next tag will be: $NEXT_TAG"

      - name: Check if commit is already in a previous release
        id: check-existing
        run: |
          set -euo pipefail
          COMMIT_SHA="${{ steps.find-commit.outputs.COMMIT_SHA }}"

          # Check if commit is directly tagged
          EXISTING=$(git tag --points-at "$COMMIT_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          if [ -n "$EXISTING" ]; then
            echo "Commit $COMMIT_SHA is already tagged as $EXISTING. Skipping."
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if commit is an ancestor of (i.e. contained in) any existing release tag
          for TAG in $(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname); do
            if git merge-base --is-ancestor "$COMMIT_SHA" "$TAG" 2>/dev/null; then
              echo "Commit $COMMIT_SHA is already contained in release $TAG. Skipping."
              echo "SKIP=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "SKIP=false" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        id: create-tag
        if: steps.check-existing.outputs.SKIP != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.next-tag.outputs.NEXT_TAG }}"
          COMMIT_SHA="${{ steps.find-commit.outputs.COMMIT_SHA }}"

          # Push the tag (may already exist from a previous failed run)
          if git ls-remote --tags origin "refs/tags/${NEW_TAG}" | grep -q "${NEW_TAG}"; then
            echo "Tag $NEW_TAG already exists on remote (likely from a previous partial run)."
          else
            git tag "$NEW_TAG" "$COMMIT_SHA"
            git push origin "$NEW_TAG"
          fi

          # Create the release (retry-safe: --generate-notes is idempotent)
          # If release already exists, this is a no-op error we can ignore.
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists."
          else
            gh release create "$NEW_TAG" \
              --target "$COMMIT_SHA" \
              --title "$NEW_TAG" \
              --generate-notes
          fi

          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Created tag $NEW_TAG at commit $COMMIT_SHA"

  build-drupal-container:
    name: Build Drupal Tag Container
    needs: tag-and-release
    if: needs.tag-and-release.result == 'success' && needs.tag-and-release.outputs.NEW_TAG != ''
    uses: ./.github/workflows/build-drupal-tag-container.yml
    with:
      tag: ${{ needs.tag-and-release.outputs.NEW_TAG }}
    permissions:
      id-token: write
      contents: read

  notify-success-slack:
    name: Notify Success (Slack)
    runs-on: ubuntu-latest
    needs:
      - tag-and-release
    if: needs.tag-and-release.result == 'success' && needs.tag-and-release.outputs.NEW_TAG != ''

    steps:
      - name: Notify Slack
        uses: department-of-veterans-affairs/platform-release-tools-actions/slack-notify@8c496a4b0c9158d18edcd9be8722ed0f79e8c5b4
        continue-on-error: true
        with:
          payload: '{"attachments": [{"color": "#2EB67D","blocks": [{"type": "section","text": {"type": "mrkdwn","text": "Tag and release ${{ needs.tag-and-release.outputs.NEW_TAG }} has been created successfully."}}]}]}'
          channel_id: ${{ env.CMS_NOTIFICATIONS_SLACK }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  notify-failure-slack:
    name: Notify Failure (Slack)
    runs-on: ubuntu-latest
    needs:
      - tag-and-release
    if: needs.tag-and-release.result == 'failure'

    steps:
      - name: Notify Slack
        uses: department-of-veterans-affairs/platform-release-tools-actions/slack-notify@8c496a4b0c9158d18edcd9be8722ed0f79e8c5b4
        continue-on-error: true
        with:
          payload: >
            {
              "attachments": [
                {
                  "color": "#E01E5A",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": ":bangbang: <!subteam^S01JXBLLMJL|cms-devops-engineers> Tag and release workflow has failed."
                      }
                    }
                  ]
                }
              ]
            }
          channel_id: ${{ env.CMS_NOTIFICATIONS_SLACK }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
